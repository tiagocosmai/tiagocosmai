# Build estático (base /) e publica em tiagocosmai.github.io → https://tiagocosmai.github.io
#
# O código pode ficar no repo "tiagocosmai"; o site vai para "tiagocosmai.github.io".
# Crie um Personal Access Token (classic) com scope "repo" e adicione como secret GH_PAGES_TOKEN.
# Ver DEPLOY.md
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static (raiz do domínio)
        run: npm run build

      - name: Verify production HTML
        run: |
          test -f dist/index.html
          ! grep -q 'main.tsx' dist/index.html || (echo 'dist must not reference main.tsx' && exit 1)
          grep -q 'assets/' dist/index.html || (echo 'dist must reference bundled assets' && exit 1)
          ! grep -q '/tiagocosmai/' dist/index.html || (echo 'dist must use root base, not /tiagocosmai/' && exit 1)

      - name: Deploy to tiagocosmai.github.io (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_TOKEN }}
          external_repository: tiagocosmai/tiagocosmai.github.io
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
